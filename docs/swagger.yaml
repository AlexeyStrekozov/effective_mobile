        type: string
    type: object
  statistics_transport_http.GetStatisticsResponse:
    properties:
      total_cost:
        type: integer
    type: object
  subscriptions_transport_http.CreateSubscriptionRequest:
    properties:
      end_date:
        example: "2026-07-15"
        type: string
      price:
        type: integer
      service_name:
        type: string
      start_date:
        example: "2025-07-15"
        type: string
      user_id:
        type: string
    type: object
  subscriptions_transport_http.CreateSubscriptionResponse:
    properties:
      end_date:
        example: "2026-07-15"
        type: string
      id:
        type: integer
      price:
        type: integer
      service_name:
        type: string
      start_date:
        example: "2025-07-15"
        type: string
